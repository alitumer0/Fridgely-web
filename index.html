<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var isGithubPages = location.hostname.endsWith('github.io') && parts.length;
      var baseHref = isGithubPages ? '/' + parts[0] + '/' : '/';
      var base = document.createElement('base');
      base.href = baseHref;
      document.head.appendChild(base);
      window.__FRIDGELY_SITE_BASE__ = baseHref;
      window.__FRIDGELY_SITE_ORIGIN__ = isGithubPages
        ? location.origin + baseHref.replace(/\/$/, '')
        : 'https://fridgely.app';
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fridgely</title>
  <meta id="meta-description" name="description" content="Fridgely ile mutfak envanterini tara, elindekilerle tarif üret ve aile akışını tek yerde yönet." />
  <link id="canonical-link" rel="canonical" href="https://fridgely.app/" />
  <meta property="og:type" content="website" />
  <meta id="og-title" property="og:title" content="Fridgely" />
  <meta id="og-description" property="og:description" content="Akıllı mutfak yönetimi, tarif üretimi ve paylaşılabilir deep-link akışları." />
  <meta id="og-url" property="og:url" content="https://fridgely.app/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta id="twitter-title" name="twitter:title" content="Fridgely" />
  <meta id="twitter-description" name="twitter:description" content="Akıllı mutfak yönetimi, tarif üretimi ve paylaşılabilir deep-link akışları." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css" />
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Fridgely",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "iOS, Android",
      "description": "Fridgely mutfak envanterini tarar, tarif üretir ve aileyle paylaşılabilir akıllı mutfak akışları sunar.",
      "url": "https://fridgely.app",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "TRY"
      }
    }
  </script>
</head>
<body>
  <div class="site-noise" aria-hidden="true"></div>
  <div id="app"></div>
  <noscript>
    <main class="no-script">
      <h1>Fridgely</h1>
      <p>Bu site JavaScript ile çalışır. Tarayıcınızda JavaScript kapalı görünüyor.</p>
    </main>
  </noscript>
  <script defer src="site.js"></script>
</body>
</html>
