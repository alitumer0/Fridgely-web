<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 844" fill="none">
  <defs>
    <linearGradient id="titanium" x1="0" y1="0" x2="390" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b0b0b5"/>
      <stop offset="12%" stop-color="#8e8e93"/>
      <stop offset="30%" stop-color="#a5a5aa"/>
      <stop offset="50%" stop-color="#7d7d82"/>
      <stop offset="68%" stop-color="#9a9a9f"/>
      <stop offset="85%" stop-color="#808085"/>
      <stop offset="100%" stop-color="#929297"/>
    </linearGradient>
    <linearGradient id="edge-light" x1="195" y1="0" x2="195" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.35)"/>
      <stop offset="30%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="70%" stop-color="rgba(255,255,255,0.04)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.18)"/>
    </linearGradient>
    <mask id="frame-mask">
      <rect width="390" height="844" rx="55" fill="white"/>
      <rect x="14" y="14" width="362" height="816" rx="44" fill="black"/>
    </mask>
  </defs>

  <!-- Titanium frame with screen cutout -->
  <rect width="390" height="844" rx="55" fill="url(#titanium)" mask="url(#frame-mask)"/>

  <!-- Outer edge highlight -->
  <rect x="0.5" y="0.5" width="389" height="843" rx="54.5" fill="none" stroke="url(#edge-light)" stroke-width="1"/>

  <!-- Inner edge (screen border) -->
  <rect x="13.5" y="13.5" width="363" height="817" rx="44.5" fill="none" stroke="rgba(0,0,0,0.6)" stroke-width="1"/>

  <!-- Dynamic Island -->
  <rect x="138" y="20" width="114" height="37" rx="18.5" fill="#101012"/>
  <!-- Camera lens detail -->
  <circle cx="168" cy="38.5" r="6" fill="#0c0c0e"/>
  <circle cx="168" cy="38.5" r="4.5" fill="#161618"/>
  <circle cx="167.5" cy="38" r="2" fill="#1e1e22"/>
  <circle cx="168" cy="38.5" r="1" fill="rgba(60,60,80,0.3)"/>

  <!-- Side buttons -->
  <!-- Silent switch -->
  <rect x="-2" y="145" width="2.5" height="24" rx="1.25" fill="#808287"/>
  <!-- Volume up -->
  <rect x="-2" y="185" width="2.5" height="40" rx="1.25" fill="#808287"/>
  <!-- Volume down -->
  <rect x="-2" y="235" width="2.5" height="40" rx="1.25" fill="#808287"/>
  <!-- Power -->
  <rect x="389.5" y="218" width="2.5" height="58" rx="1.25" fill="#808287"/>
</svg>
