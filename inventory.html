<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <script>
    (function () {
      var parts = location.pathname.split('/').filter(Boolean);
      var isGithubPages = location.hostname.endsWith('github.io') && parts.length;
      var baseHref = isGithubPages ? '/' + parts[0] + '/' : '/';
      var base = document.createElement('base');
      base.href = baseHref;
      document.head.appendChild(base);
      window.__FRIDGELY_SITE_BASE__ = baseHref;
      window.__FRIDGELY_SITE_ORIGIN__ = isGithubPages
        ? location.origin + baseHref.replace(/\/$/, '')
        : 'https://fridgely.app';
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Fridgely Inventory</title>
  <meta id="meta-description" name="description" content="Fridgely inventory fallback sayfası." />
  <link id="canonical-link" rel="canonical" href="https://fridgely.app/inventory" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="site.css?v=4" />
</head>
<body>
  <div class="site-noise" aria-hidden="true"></div>
  <div id="app"></div>
  <script defer src="site.js?v=4"></script>
</body>
</html>
