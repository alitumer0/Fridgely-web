<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Shadow -->
  <rect x="6" y="6" width="28" height="34" rx="4" fill="#1a1a2e"/>
  <!-- Fridge body -->
  <rect x="4" y="4" width="28" height="34" rx="4" fill="#ffd23f" stroke="#1a1a2e" stroke-width="3"/>
  <!-- Divider line (freezer/fridge) -->
  <line x1="4" y1="16" x2="32" y2="16" stroke="#1a1a2e" stroke-width="3"/>
  <!-- Freezer handle -->
  <rect x="25" y="9" width="3" height="4" rx="1.5" fill="#1a1a2e"/>
  <!-- Fridge handle -->
  <rect x="25" y="20" width="3" height="6" rx="1.5" fill="#1a1a2e"/>
  <!-- Small magnet/sticker on fridge -->
  <circle cx="12" cy="25" r="3" fill="#ff5277" stroke="#1a1a2e" stroke-width="2"/>
</svg>
